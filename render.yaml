services:
  - type: web
    name: api-conversor-de-video
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: CORS_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: DEFAULT_MAX_DURATION_SEC
        value: "10800"
      - key: MAX_UPLOAD_MB
        value: "100"
      - key: FFMPEG_TIMEOUT_SEC
        value: "1800"
      - key: JOB_TTL_SEC
        value: "3600"
      - key: JOB_WORKERS
        value: "1"
